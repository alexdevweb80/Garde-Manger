<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>
        Garde-Manger - Gestion d'Inventaire Premium</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="container glass-effect">
        <div class="header">
            <div class="logo-section">
                <i class="fas fa-utensils"></i>
                <h1 class="playfair">Garde-Manger</h1>
            </div>
            <p class="subtitle">Gestion d'inventaire gastronomique</p>
        </div>

        <div id="auth-section" class="auth-section">
            <div id="file-warning" class="alert-stat glass-card" style="display:none; margin-bottom: 20px; padding: 15px; color: white; max-width: 420px; text-align: center;">
                <i class="fas fa-exclamation-triangle"></i>
                <p style="font-size: 0.9rem;">Mode local (file://) détecté. Utilisez un serveur local pour l'authentification.</p>
            </div>
            
            <div id="user-info" class="user-info" style="display:none;"></div>
            
            <div id="auth-card" class="auth-card-wrapper">
                <div class="auth-tabs">
                    <button id="tab-login" class="auth-tab active">Connexion</button>
                    <button id="tab-signup" class="auth-tab">Inscription</button>
                </div>

                <!-- Login Form -->
                <div id="login-container" class="auth-container">
                    <form id="login-form" class="glass-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Email" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Mot de passe" class="glass-input" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <span>Se connecter</span>
                            <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                        </button>
                    </form>
                </div>

                <!-- Signup Form -->
                <div id="signup-container" class="auth-container hidden">
                    <form id="signup-form" class="glass-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="Email" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="Mot de passe" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="signup-confirm-password" placeholder="Confirmer" class="glass-input" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-full">
                            <span>S'inscrire</span>
                            <i class="fas fa-user-plus" style="margin-left: 10px;"></i>
                        </button>
                    </form>
                </div>
            </div>

            <button id="logout-btn" class="btn btn-danger btn-glass" style="display:none; margin-top: 30px;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Déconnexion</span>
            </button>
        </div>

        <div id="dashboard" class="dashboard" style="display:none;">
            <!-- Welcome Header -->
            <div class="header" style="margin-bottom: 40px;">
                <h2 id="welcome-msg" class="playfair" style="font-size: 2.5rem;">Tableau de Bord</h2>
                <p class="subtitle">Votre Inventaire Nebula</p>
            </div>

            <!-- Statistiques avec animations -->
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-icon">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Total Produits</h3>
                        <p id="total-count" class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon" style="color: var(--danger); background: rgba(239, 68, 68, 0.1);">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Stocks Critiques</h3>
                        <p id="critical-count" class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon" style="color: var(--warning); background: rgba(245, 158, 11, 0.1);">
                        <i class="fas fa-shopping-basket"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Liste d'achats</h3>
                        <p id="shopping-items-count" class="stat-number">0</p>
                    </div>
                </div>
            </div>

            <!-- Catégories -->
            <div class="categories-container">
                <div class="category frigo glass-card">
                    <div class="category-header">
                        <i class="fas fa-snowflake"></i>
                        <h2 class="playfair" style="font-size: 1.8rem;">Cellier Frais</h2>
                    </div>
                    <div class="add-item">
                        <input type="text" id="frigo-name" placeholder="Ex: Lait, Beurre..." class="glass-input">
                        <input type="number" id="frigo-quantity" value="1" min="1" class="glass-input">
                        <button onclick="addItem('frigo')" class="btn-add">Ajouter</button>
                    </div>
                    <div id="frigo-list" class="items-list"></div>
                </div>

                <div class="category placard glass-card">
                    <div class="category-header">
                        <i class="fas fa-archive"></i>
                        <h2 class="playfair" style="font-size: 1.8rem;">Réserve Sèche</h2>
                    </div>
                    <div class="add-item">
                        <input type="text" id="placard-name" placeholder="Ex: Pâtes, Riz..." class="glass-input">
                        <input type="number" id="placard-quantity" value="1" min="1" class="glass-input">
                        <button onclick="addItem('placard')" class="btn-add">Ajouter</button>
                    </div>
                    <div id="placard-list" class="items-list"></div>
                </div>
            </div>

            <!-- Liste de courses -->
            <div class="shopping-section glass-card">
                <div class="section-header">
                    <i class="fas fa-shopping-cart"></i>
                    <h2 class="playfair" style="font-size: 2rem;">Liste de Courses</h2>
                    <button id="clear-shopping-list" onclick="clearShoppingList()" class="btn btn-danger btn-glass" style="display:none;">
                        <i class="fas fa-trash"></i>
                        <span>Vider</span>
                    </button>
                </div>
                <div id="shopping-list" class="shopping-list"></div>
            </div>
        </div>
    </div>

    <!-- Tab switching — plain script, runs even if Firebase fails -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tabLogin  = document.getElementById('tab-login');
            var tabSignup = document.getElementById('tab-signup');
            var loginBox  = document.getElementById('login-container');
            var signupBox = document.getElementById('signup-container');

            function showLogin() {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginBox.classList.remove('hidden');
                loginBox.style.display  = 'block';
                loginBox.style.opacity  = '1';
                loginBox.style.transform = 'translateX(0)';
                signupBox.classList.add('hidden');
                signupBox.style.display = 'none';
            }

            function showSignup() {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupBox.classList.remove('hidden');
                signupBox.style.display  = 'block';
                signupBox.style.opacity  = '1';
                signupBox.style.transform = 'translateX(0)';
                loginBox.classList.add('hidden');
                loginBox.style.display  = 'none';
            }

            if (tabLogin)  tabLogin.addEventListener('click',  showLogin);
            if (tabSignup) tabSignup.addEventListener('click', showSignup);

            // Start with login visible
            showLogin();
        });
    </script>
    <script type="module" src="script.js"></script>
</body>

</html>
