<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Garde-Manger</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="container glass-effect">
        <div class="header">
            <div class="logo-section">
                <i class="fas fa-utensils"></i>
                <h1 class="playfair">Garde-Manger</h1>
            </div>
            <p class="subtitle">Gestion d'inventaire !</p>
        </div>

        <div id="auth-section" class="auth-section">
            <div id="file-warning" class="alert-stat glass-card" style="display:none; margin-bottom: 20px; padding: 15px; color: white; max-width: 420px; text-align: center;">
                <i class="fas fa-exclamation-triangle"></i>
                <p style="font-size: 0.9rem;">Mode local (file://) détecté. Utilisez un serveur local pour l'authentification.</p>
            </div>
            
            <div id="user-info" class="user-info" style="display:none;"></div>
            
            <div id="auth-card" class="auth-card-wrapper">
                <div class="auth-tabs">
                    <button id="tab-login" class="auth-tab active">Connexion</button>
                    <button id="tab-signup" class="auth-tab">Inscription</button>
                </div>

                <!-- Login Form -->
                <div id="login-container" class="auth-container">
                    <form id="login-form" class="glass-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Email" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Mot de passe" class="glass-input" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <span>Se connecter</span>
                            <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                        </button>
                    </form>
                </div>

                <!-- Signup Form -->
                <div id="signup-container" class="auth-container hidden">
                    <form id="signup-form" class="glass-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="Email" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="Mot de passe" class="glass-input" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="signup-confirm-password" placeholder="Confirmer" class="glass-input" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-full">
                            <span>S'inscrire</span>
                            <i class="fas fa-user-plus" style="margin-left: 10px;"></i>
                        </button>
                    </form>
                </div>
            </div>

            <button id="logout-btn" class="btn btn-danger btn-glass" style="display:none; margin-top: 30px;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Déconnexion</span>
            </button>
        </div>

        <div id="dashboard" class="dashboard" style="display:none;">
            <!-- Welcome Header -->
            <div class="header" style="margin-bottom: 40px;">
                <h2 id="welcome-msg" class="playfair" style="font-size: 2.5rem;">Tableau de Bord</h2>
                <p class="subtitle">Votre Inventaire Nebula</p>
            </div>

            <!-- Statistiques avec animations -->
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-icon">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Total Produits</h3>
                        <p id="total-count" class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon" style="color: var(--danger); background: rgba(239, 68, 68, 0.1);">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Stocks Critiques</h3>
                        <p id="critical-count" class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon" style="color: var(--warning); background: rgba(245, 158, 11, 0.1);">
                        <i class="fas fa-shopping-basket"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Liste d'achats</h3>
                        <p id="shopping-items-count" class="stat-number">0</p>
                    </div>
                </div>
            </div>

            <!-- Catégories -->
            <div class="categories-container">
                <div class="category frigo glass-card">
                    <div class="category-header">
                        <i class="fas fa-snowflake"></i>
                        <h2 class="playfair" style="font-size: 1.8rem;">Frigidaire</h2>
                    </div>
                    <div class="add-item">
                        <input type="text" id="frigo-name" list="frigo-suggestions" placeholder="Ex: Lait, Beurre..." class="glass-input" autocomplete="off">
                        <input type="number" id="frigo-quantity" value="1" min="1" class="glass-input">
                        <button onclick="addItem('frigo')" class="btn-add">Ajouter</button>
                    </div>
                    <div id="frigo-list" class="items-list"></div>
                </div>

                <div class="category placard glass-card">
                    <div class="category-header">
                        <i class="fas fa-archive"></i>
                        <h2 class="playfair" style="font-size: 1.8rem;">Réserve Sèche</h2>
                    </div>
                    <div class="add-item">
                        <input type="text" id="placard-name" list="placard-suggestions" placeholder="Ex: Pâtes, Riz..." class="glass-input" autocomplete="off">
                        <input type="number" id="placard-quantity" value="1" min="1" class="glass-input">
                        <button onclick="addItem('placard')" class="btn-add">Ajouter</button>
                    </div>
                    <div id="placard-list" class="items-list"></div>
                </div>
            </div>

            <!-- Datalist Frigo -->
            <datalist id="frigo-suggestions">
                <option value="Lait">🥛 Lait</option>
                <option value="Lait demi-écrémé"></option>
                <option value="Lait entier"></option>
                <option value="Beurre">🧈 Beurre</option>
                <option value="Crème fraîche">🥛 Crème fraîche</option>
                <option value="Crème liquide"></option>
                <option value="Fromage">🧀 Fromage</option>
                <option value="Camembert"></option>
                <option value="Brie"></option>
                <option value="Comté"></option>
                <option value="Emmental"></option>
                <option value="Gouda"></option>
                <option value="Yaourt nature">🫙 Yaourt nature</option>
                <option value="Yaourt aux fruits"></option>
                <option value="Yaourt grec"></option>
                <option value="Oeufs">🥚 Oeufs</option>
                <option value="Poulet">🍗 Poulet</option>
                <option value="Escalope de poulet"></option>
                <option value="Blanc de poulet"></option>
                <option value="Steak haché">🥩 Steak haché</option>
                <option value="Boeuf"></option>
                <option value="Côte de porc">🥓 Côte de porc</option>
                <option value="Jambon">🥓 Jambon</option>
                <option value="Lardons"></option>
                <option value="Saumon">🐟 Saumon</option>
                <option value="Thon"></option>
                <option value="Cabillaud"></option>
                <option value="Crevettes">🦐 Crevettes</option>
                <option value="Tomate">🍅 Tomate</option>
                <option value="Salade">🥗 Salade</option>
                <option value="Laitue"></option>
                <option value="Roquette"></option>
                <option value="Carotte">🥕 Carotte</option>
                <option value="Courgette">🥒 Courgette</option>
                <option value="Poivron">🌶️ Poivron</option>
                <option value="Brocoli">🥦 Brocoli</option>
                <option value="Épinards">🌿 Épinards</option>
                <option value="Champignons">🍄 Champignons</option>
                <option value="Avocat">🥑 Avocat</option>
                <option value="Concombre">🥒 Concombre</option>
                <option value="Pomme">🍎 Pomme</option>
                <option value="Banane">🍌 Banane</option>
                <option value="Orange">🍊 Orange</option>

            </datalist>

            <!-- Datalist Placard -->
            <datalist id="placard-suggestions">
                <option value="Pâtes">🍝 Pâtes</option>
                <option value="Spaghetti"></option>
                <option value="Penne"></option>
                <option value="Tagliatelles"></option>

                <option value="Sucre glace"></option>
                <option value="Sel">🧂 Sel</option>
                <option value="Poivre"></option>
                <option value="Huile d'olive">🫒 Huile d'olive</option>
                <option value="Huile de tournesol"></option>

                <option value="Concentré de tomate"></option>
                <option value="Bouillon de poulet"></option>

                <option value="Café">☕ Café</option>
                <option value="Café en grains"></option>
                <option value="Thé">🍵 Thé</option>
                <option value="Tisane"></option>
                <option value="Chocolat noir">🍫 Chocolat noir</option>
                <option value="Chocolat au lait"></option>
                <option value="Cacao en poudre"></option>

                <option value="Pain de mie">🍞 Pain de mie</option>

            </datalist>


            <!-- Liste de courses -->
            <div class="shopping-section glass-card">
                <div class="section-header">
                    <i class="fas fa-shopping-cart"></i>
                    <h2 class="playfair" style="font-size: 2rem;">Liste de Courses</h2>
                    <button id="clear-shopping-list" onclick="clearShoppingList()" class="btn btn-danger btn-glass" style="display:none;">
                        <i class="fas fa-trash"></i>
                        <span>Vider</span>
                    </button>
                </div>
                <div id="shopping-list" class="shopping-list"></div>
            </div>
        </div>
    </div>

    <!-- Tab switching — plain script, runs even if Firebase fails -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tabLogin  = document.getElementById('tab-login');
            var tabSignup = document.getElementById('tab-signup');
            var loginBox  = document.getElementById('login-container');
            var signupBox = document.getElementById('signup-container');

            function showLogin() {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginBox.classList.remove('hidden');
                loginBox.style.display  = 'block';
                loginBox.style.opacity  = '1';
                loginBox.style.transform = 'translateX(0)';
                signupBox.classList.add('hidden');
                signupBox.style.display = 'none';
            }

            function showSignup() {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupBox.classList.remove('hidden');
                signupBox.style.display  = 'block';
                signupBox.style.opacity  = '1';
                signupBox.style.transform = 'translateX(0)';
                loginBox.classList.add('hidden');
                loginBox.style.display  = 'none';
            }

            if (tabLogin)  tabLogin.addEventListener('click',  showLogin);
            if (tabSignup) tabSignup.addEventListener('click', showSignup);

            // Start with login visible
            showLogin();
        });
    </script>
    <script type="module" src="script.js"></script>
</body>

</html>
